<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Club Management System</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Suppress Tailwind CSS development mode warnings
    tailwind.config = {
      mode: 'jit',
      darkMode: 'class'
    }
    
    // Suppress development warnings in console
    const originalWarn = console.warn;
    console.warn = function(...args) {
      const message = args.join(' ');
      // Filter out known development warnings
      if (message.includes('cdn.tailwindcss.com') || 
          message.includes('Babel') || 
          message.includes('transformScriptTags')) {
        return;
      }
      originalWarn.apply(console, args);
    };
    
    const originalLog = console.log;
    console.log = function(...args) {
      const message = args.join(' ');
      // Filter out Babel logs
      if (message.includes('Babel') || message.includes('precompile')) {
        return;
      }
      originalLog.apply(console, args);
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
    
    body {
      margin: 0;
      font-family: 'Rajdhani', sans-serif;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-slide-down { animation: slideDown 0.4s ease-out; }
    .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    .animate-pulse-slow { animation: pulse 3s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lucide Icons as React components
    const Icons = {
      Trophy: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>

      Users: (props) => (

      ),
      Star: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>

        </svg>
      ),

          <line x1="5" y1="12" x2="19" y2="12"/>

      ),
      Trash2: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      ),
      Calendar: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      ),
      Award: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
        </svg>
      ),
      Shield: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      ),
      User: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      ),
      LogIn: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      ),
      UserPlus: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
      ),
      Eye: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      ),
      EyeOff: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      ),
      Check: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      ),
      X: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      ),
      Crown: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/>
        </svg>
      ),
      Clock: (props) => (
        <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      ),
    };

    // API-based storage for cross-device functionality
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
      ? 'http://localhost:3000/api'
      : '/api';

    const storage = {
      get: async (key, shared) => {
        try {
          const type = key.replace('all-', '').replace('current-', '');
          const response = await fetch(`${API_BASE}/storage?type=${type}`);
          const result = await response.json();
          
          if (result.success && result.data) {
            return { 
              key, 
              value: JSON.stringify(result.data), 
              shared 
            };
          }
          return null;
        } catch (error) {
          console.error('Storage get error:', error);
          // Fallback to localStorage
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          const value = localStorage.getItem(storageKey);
          return value ? { key, value, shared } : null;
        }
      },
      
      set: async (key, value, shared) => {
        try {
          const type = key.replace('all-', '').replace('current-', '');
          const data = typeof value === 'string' ? JSON.parse(value) : value;
          
          const response = await fetch(`${API_BASE}/storage?type=${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data })
          });
          
          const result = await response.json();
          
          if (result.success) {
            // Also save to localStorage as backup
            const storageKey = shared ? `shared_${key}` : `user_${key}`;
            localStorage.setItem(storageKey, value);
            return { key, value, shared };
          }
          return null;
        } catch (error) {
          console.error('Storage set error:', error);
          // Fallback to localStorage
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          localStorage.setItem(storageKey, value);
          return { key, value, shared };
        }
      },
      
      delete: async (key, shared) => {
        try {
          const type = key.replace('all-', '').replace('current-', '');
          await fetch(`${API_BASE}/storage?type=${type}`, {
            method: 'DELETE'
          });
          
          // Also delete from localStorage
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          localStorage.removeItem(storageKey);
          return { key, deleted: true, shared };
        } catch (error) {
          console.error('Storage delete error:', error);
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          localStorage.removeItem(storageKey);
          return { key, deleted: true, shared };
        }
      },
      
      listAll: () => {
        const keys = Object.keys(localStorage);
        const result = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          result[key] = localStorage.getItem(key)?.substring(0, 50) + '...';
        }
        return result;
      }
    };

    // Make storage available globally
    window.storage = storage;

    function AIClubManagement() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('login');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        initializeApp();
      }, []);

      const initializeApp = async () => {
        // Initialize demo accounts
        try {
          const usersResult = await storage.get('all-users', true);
          if (!usersResult) {
            const demoUsers = [
              {
                id: 'admin1',
                username: 'admin',
                password: 'admin123',
                fullName: 'Admin User',
                role: 'admin',
                createdAt: new Date().toISOString()
              },
              {
                id: 'user1',
                username: 'user',
                password: 'user123',
                fullName: 'Test User',
                role: 'user',
                createdAt: new Date().toISOString()
              }
            ];
            await storage.set('all-users', JSON.stringify(demoUsers), true);
          }
        } catch (error) {
          console.log('Error initializing demo accounts:', error);
        }

        // Load user session
        try {
          const userResult = await storage.get('current-user', false);
          if (userResult && userResult.value) {
            setUser(JSON.parse(userResult.value));
            setView('main');
          }
        } catch (error) {
          console.log('No session found');
        } finally {
          setLoading(false);
        }
      };

      const handleLogin = async (userData) => {
        setUser(userData);
        await storage.set('current-user', JSON.stringify(userData), false);
        setView('main');
      };

      const handleLogout = async () => {
        await storage.delete('current-user', false);
        setUser(null);
        setView('login');
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-indigo-950 via-purple-950 to-slate-900 flex items-center justify-center">
            <div className="text-cyan-400 text-2xl font-bold animate-pulse">Loading AI Club...</div>
          </div>
        );
      }

      if (view === 'login') {
        return <LoginScreen onLogin={handleLogin} />;
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-950 via-purple-950 to-slate-900 text-white">
          <Header user={user} onLogout={handleLogout} />
          
          {user && user.role === 'admin' ? (
            <AdminDashboard user={user} />
          ) : user ? (
            <UserDashboard user={user} />
          ) : (
            <div className="flex items-center justify-center min-h-screen">
              <div className="text-cyan-400 text-2xl">Loading...</div>
            </div>
          )}
        </div>
      );
    }

    function LoginScreen({ onLogin }) {
      const [isSignup, setIsSignup] = useState(false);
      const [formData, setFormData] = useState({
        username: '',
        password: '',
        fullName: '',
        role: 'user'
      });
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (isSignup) {
          if (!formData.username || !formData.password || !formData.fullName) {
            setError('All fields are required');
            return;
          }

          if (formData.username.length < 3) {
            setError('Username must be at least 3 characters');
            return;
          }

          if (formData.password.length < 6) {
            setError('Password must be at least 6 characters');
            return;
          }

          try {
            const usersResult = await storage.get('all-users', true);
            const users = usersResult ? JSON.parse(usersResult.value) : [];
            
            if (users.find(u => u.username === formData.username)) {
              setError('Username already exists');
              return;
            }

            const newUser = {
              id: Date.now().toString(),
              username: formData.username,
              password: formData.password,
              fullName: formData.fullName,
              role: formData.role,
              createdAt: new Date().toISOString()
            };

            users.push(newUser);
            const saveResult = await storage.set('all-users', JSON.stringify(users), true);
            
            if (saveResult) {
              alert('Account created successfully! Logging you in...');
              onLogin(newUser);
            } else {
              setError('Failed to save account. Please try again.');
            }
          } catch (error) {
            console.error('Signup error:', error);
            setError('Failed to create account: ' + error.message);
          }
        } else {
          if (!formData.username || !formData.password) {
            setError('Username and password are required');
            return;
          }

          try {
            const usersResult = await storage.get('all-users', true);
            
            if (!usersResult || !usersResult.value) {
              setError('No users found. Please sign up first.');
              return;
            }

            const users = JSON.parse(usersResult.value);
            const user = users.find(u => u.username === formData.username && u.password === formData.password);
            
            if (user) {
              onLogin(user);
            } else {
              setError('Invalid username or password');
            }
          } catch (error) {
            console.error('Login error:', error);
            setError('Login failed: ' + error.message);
          }
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full">
            <div className="text-center mb-8 animate-slide-down">
              <h1 className="text-6xl font-black mb-3 bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 bg-clip-text text-transparent" 
                  style={{ fontFamily: 'Orbitron, sans-serif' }}>
                AI CLUB
              </h1>
              <p className="text-cyan-300 text-xl">Event Management System</p>
            </div>

            <div className="bg-slate-800/70 backdrop-blur-xl rounded-2xl p-8 border border-cyan-500/30 shadow-2xl animate-fade-in">
              <div className="flex gap-4 mb-6">
                <button
                  onClick={() => {
                    setIsSignup(false);
                    setError('');
                  }}
                  className={`flex-1 py-3 rounded-lg font-bold transition-all ${
                    !isSignup
                      ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white'
                      : 'bg-slate-700 text-slate-400 hover:text-white'
                  }`}
                >
                  <Icons.LogIn className="inline-block w-5 h-5 mr-2" />
                  Login
                </button>
                <button
                  onClick={() => {
                    setIsSignup(true);
                    setError('');
                  }}
                  className={`flex-1 py-3 rounded-lg font-bold transition-all ${
                    isSignup
                      ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white'
                      : 'bg-slate-700 text-slate-400 hover:text-white'
                  }`}
                >
                  <Icons.UserPlus className="inline-block w-5 h-5 mr-2" />
                  Sign Up
                </button>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                {isSignup && (
                  <div>
                    <label className="block text-sm font-bold text-cyan-400 mb-2">Full Name</label>
                    <input
                      type="text"
                      value={formData.fullName}
                      onChange={(e) => setFormData({ ...formData, fullName: e.target.value })}
                      className="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400"
                      placeholder="Enter your full name"
                    />
                  </div>
                )}

                <div>
                  <label className="block text-sm font-bold text-cyan-400 mb-2">Username</label>
                  <input
                    type="text"
                    value={formData.username}
                    onChange={(e) => setFormData({ ...formData, username: e.target.value })}
                    className="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400"
                    placeholder="Choose a username"
                  />
                </div>

                <div>
                  <label className="block text-sm font-bold text-cyan-400 mb-2">Password</label>
                  <div className="relative">
                    <input
                      type={showPassword ? 'text' : 'password'}
                      value={formData.password}
                      onChange={(e) => setFormData({ ...formData, password: e.target.value })}
                      className="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400"
                      placeholder="Enter password"
                    />
                    <button
                      type="button"
                      onClick={() => setShowPassword(!showPassword)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"
                    >
                      {showPassword ? <Icons.EyeOff className="w-5 h-5" /> : <Icons.Eye className="w-5 h-5" />}
                    </button>
                  </div>
                </div>

                {isSignup && (
                  <div>
                    <label className="block text-sm font-bold text-cyan-400 mb-2">Role</label>
                    <select
                      value={formData.role}
                      onChange={(e) => setFormData({ ...formData, role: e.target.value })}
                      className="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400"
                    >
                      <option value="user">User (Participant)</option>
                      <option value="admin">Admin (Organizer)</option>
                    </select>
                  </div>
                )}

                {error && (
                  <div className="bg-red-500/20 border border-red-500 rounded-lg p-3 text-red-300 text-sm">
                    {error}
                  </div>
                )}

                <button
                  type="submit"
                  className="w-full bg-gradient-to-r from-cyan-500 to-purple-500 hover:from-cyan-400 hover:to-purple-400 py-3 rounded-lg font-bold text-lg shadow-lg transform hover:scale-105 transition-all"
                >
                  {isSignup ? 'Create Account' : 'Login'}
                </button>
              </form>

              <div className="mt-6 text-center text-sm text-slate-400">
                <p className="mb-2">Demo Accounts:</p>
                <p>Admin: <span className="text-cyan-400">admin / admin123</span></p>
                <p>User: <span className="text-purple-400">user / user123</span></p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Header({ user, onLogout }) {
      if (!user) return null;
      
      return (
        <header className="bg-slate-900/50 backdrop-blur-lg border-b border-cyan-500/30 p-4">
          <div className="max-w-7xl mx-auto flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-cyan-500 to-purple-500 rounded-lg flex items-center justify-center">

    function AdminDashboard({ user }) {
      const [events, setEvents] = useState([]);
      const [teams, setTeams] = useState([]);
      const [activeTab, setActiveTab] = useState('events');
      const [showCreateEvent, setShowCreateEvent] = useState(false);

      useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const eventsResult = await storage.get('all-events', true);
          const teamsResult = await storage.get('all-teams', true);
          
          if (eventsResult && eventsResult.value) {
            setEvents(JSON.parse(eventsResult.value));
          }
          if (teamsResult && teamsResult.value) {
            setTeams(JSON.parse(teamsResult.value));
          }
        } catch (error) {
          console.log('Error loading data');
        }
      };

      const createEvent = async (eventData) => {
        const newEvent = {
          id: Date.now().toString(),
          ...eventData,
          createdBy: user.id,
          createdAt: new Date().toISOString()
        };

        const updatedEvents = [...events, newEvent];
        setEvents(updatedEvents);
        await storage.set('all-events', JSON.stringify(updatedEvents), true);
        setShowCreateEvent(false);
        alert('Event created successfully!');
      };

      const deleteEvent = async (eventId) => {
        if (window.confirm('Are you sure you want to delete this event?')) {
          const updatedEvents = events.filter(e => e.id !== eventId);
          setEvents(updatedEvents);
          await storage.set('all-events', JSON.stringify(updatedEvents), true);
        }
      };

      const assignPoints = async (teamId, eventId, points) => {
        const updatedTeams = teams.map(team => {
          if (team.id === teamId) {
            const eventPoints = { ...team.eventPoints };
            eventPoints[eventId] = points;
            const totalPoints = Object.values(eventPoints).reduce((sum, p) => sum + p, 0);
            return { ...team, eventPoints, totalPoints };
          }
          return team;
        });

        setTeams(updatedTeams);
        await storage.set('all-teams', JSON.stringify(updatedTeams), true);
      };

      return (
        <div className="max-w-7xl mx-auto p-6">
          <div className="flex gap-4 mb-6">
            <button
              onClick={() => setActiveTab('events')}
              className={`px-6 py-3 rounded-lg font-bold flex items-center gap-2 transition-all ${
                activeTab === 'events'
                  ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-lg'
                  : 'bg-slate-800 text-slate-400 hover:text-white'
              }`}
            >
              <Icons.Calendar className="w-5 h-5" /> Events
            </button>
            <button
              onClick={() => setActiveTab('teams')}
              className={`px-6 py-3 rounded-lg font-bold flex items-center gap-2 transition-all ${
                activeTab === 'teams'
                  ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-lg'
                  : 'bg-slate-800 text-slate-400 hover:text-white'
              }`}
            >
              <Icons.Users className="w-5 h-5" /> Teams & Scoring
            </button>
          </div>

          {activeTab === 'events' && (
            <EventsTab
              events={events}
              showCreateEvent={showCreateEvent}
              setShowCreateEvent={setShowCreateEvent}
              createEvent={createEvent}
              deleteEvent={deleteEvent}
            />
          )}

          {activeTab === 'teams' && (
            <ScoringTab
              teams={teams}
              events={events}
              assignPoints={assignPoints}
            />
          )}
        </div>
      );
    }

        try {

            const loadedEvents = JSON.parse(eventsResult.value);
            setEvents(loadedEvents);

          if (teamsResult && teamsResult.value) {

        name: '',

      });

        try {
          const result = await storage.get('all-events', true);
          const raw = localStorage.getItem('shared_all-events');
          const allKeys = storage.listAll();
          
          setDebugInfo(JSON.stringify({
            hasResult: !!result,
            resultValue: result?.value?.substring(0, 200),
            rawLocalStorage: raw?.substring(0, 200),
            eventsCount: events.length,
            allStorageKeys: Object.keys(allKeys)
          }, null, 2));
        } catch (error) {
          setDebugInfo('Error: ' + error.message);
        }
      };

      const handleCreateTeam = (event) => {
        setSelectedEvent(event);
        setShowCreateTeam(true);
        setTeamFormData({
          name: '',
          members: [user.fullName, '']
        });
      };

      const addMember = () => {
        if (teamFormData.members.length < 4) {
          setTeamFormData({
            ...teamFormData,
            members: [...teamFormData.members, '']
          });
        }
      };

      const removeMember = (index) => {
        if (teamFormData.members.length > 2) {
          setTeamFormData({
            ...teamFormData,
            members: teamFormData.members.filter((_, i) => i !== index)
          });
        }
      };

      const updateMember = (index, value) => {
        const newMembers = [...teamFormData.members];
        newMembers[index] = value;
        setTeamFormData({ ...teamFormData, members: newMembers });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const validMembers = teamFormData.members.filter(m => m.trim() !== '');
        if (validMembers.length >= 2 && validMembers.length <= 4) {
          createTeam({
            ...teamFormData,
            members: validMembers,
            eventId: selectedEvent.id
          });
        } else {
          alert('Team must have 2-4 members');
        }
      };

      return (
        <div>
          {/* Debug Panel */}
          <div className="mb-6 p-4 bg-yellow-900/30 border border-yellow-600 rounded-lg">
            <h3 className="text-yellow-400 font-bold mb-2">🔍 DEBUG INFO</h3>

              className="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded text-sm font-bold mb-2"

              Check Storage

              <pre className="text-xs text-yellow-100 bg-slate-900/50 p-2 rounded overflow-auto max-h-40">
                {debugInfo}
              </pre>

          {showCreateTeam && selectedEvent && (
            <div className="bg-slate-800/70 backdrop-blur-lg rounded-2xl p-6 border border-cyan-500/30 mb-6 animate-slide-down">

                <div>
                  <label className="block text-sm font-bold text-cyan-400 mb-2">Team Name</label>
                  <input
                    type="text"
                    value={teamFormData.name}
                    onChange={(e) => setTeamFormData({ ...teamFormData, name: e.target.value })}
                    className="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400"
                    placeholder="e.g., Team Alpha"
                    required
                  />
                </div>

                <div>
                  <label className="block text-sm font-bold text-cyan-400 mb-2">
                    Team Members (2-4 members)
                  </label>
                  <div className="space-y-3">
                    {teamFormData.members.map((member, index) => (
                      <div key={index} className="flex gap-2">
                        <input
                          type="text"
                          value={member}
                          onChange={(e) => updateMember(index, e.target.value)}
                          disabled={index === 0}
                          className="flex-1 bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400 disabled:opacity-50"
                          placeholder={index === 0 ? 'You (Team Leader)' : `Member ${index + 1} name`}
                          required
                        />
                        {index > 1 && (
                          <button
                            type="button"
                            onClick={() => removeMember(index)}
                            className="bg-red-500/20 hover:bg-red-500/30 text-red-300 px-3 rounded-lg"
                          >
                            <Icons.Trash2 className="w-5 h-5" />
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                  {teamFormData.members.length < 4 && (
                    <button
                      type="button"
                      onClick={addMember}
                      className="mt-3 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2"
                    >
                      <Icons.Plus className="w-4 h-4" /> Add Member
                    </button>
                  )}
                </div>

                <div className="flex gap-3">
                  <button
                    type="submit"
                    className="flex-1 bg-gradient-to-r from-cyan-500 to-purple-500 hover:from-cyan-400 hover:to-purple-400 py-3 rounded-lg font-bold flex items-center justify-center gap-2"
                  >
                    <Icons.Check className="w-5 h-5" /> Create Team
                  </button>
                  <button
                    type="button"
                    onClick={() => setShowCreateTeam(false)}
                    className="px-6 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-bold"
                  >
                    <Icons.X className="w-5 h-5" />
                  </button>
                </div>
              </form>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {events.length === 0 ? (
              <div className="col-span-full text-center py-12 text-slate-400">
                <Icons.Calendar className="w-16 h-16 mx-auto mb-4 opacity-50" />
                <p className="text-xl">No events available</p>
                <p className="text-sm">Check back later for upcoming events</p>
              </div>
            ) : (
              events.map((event) => {
                const eventTeams = teams.filter(t => t.eventId === event.id);
                const userInEvent = eventTeams.some(t => t.members.includes(user.fullName));

                return (
                  <div
                    key={event.id}
                    className="bg-slate-800/70 backdrop-blur-lg rounded-xl p-5 border border-slate-700 hover:border-cyan-500/50 transition-all"
                  >
                    <h3 className="text-xl font-bold text-white mb-2">{event.name}</h3>
                    <p className="text-slate-300 text-sm mb-3">{event.description}</p>
                    <div className="space-y-2 text-sm mb-4">
                      <div className="flex items-center gap-2 text-cyan-400">
                        <Icons.Calendar className="w-4 h-4" />
                        <span>{new Date(event.date).toLocaleDateString()}</span>
                      </div>
                      <div className="flex items-center gap-2 text-purple-400">
                        <Icons.Clock className="w-4 h-4" />
                        <span>{event.duration}</span>
                      </div>
                      <div className="flex items-center gap-2 text-yellow-400">
                        <Icons.Star className="w-4 h-4" />
                        <span>Max {event.maxPoints} points</span>
                      </div>
                      <div className="flex items-center gap-2 text-green-400">
                        <Icons.Users className="w-4 h-4" />
                        <span>{eventTeams.length} teams registered</span>
                      </div>
                    </div>

                    {userInEvent ? (
                      <div className="bg-green-500/20 border border-green-500 rounded-lg p-3 text-green-300 text-sm flex items-center gap-2">
                        <Icons.Check className="w-4 h-4" />
                        You're registered for this event
                      </div>
                    ) : (
                      <button
                        onClick={() => handleCreateTeam(event)}
                        className="w-full bg-gradient-to-r from-cyan-500 to-purple-500 hover:from-cyan-400 hover:to-purple-400 py-3 rounded-lg font-bold flex items-center justify-center gap-2"
                      >
                        <Icons.Plus className="w-5 h-5" /> Create Team
                      </button>
                    )}
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    function MyTeamsTab({ myTeams, events }) {
      return (
        <div>
          {myTeams.length === 0 ? (
            <div className="text-center py-12 text-slate-400">
              <Icons.Users className="w-16 h-16 mx-auto mb-4 opacity-50" />
              <p className="text-xl">You haven't joined any teams yet</p>
              <p className="text-sm">Go to Events tab to create a team</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {myTeams.map((team) => {
                const event = events.find(e => e.id === team.eventId);
                return (
                  <div
                    key={team.id}
                    className="bg-slate-800/70 backdrop-blur-lg rounded-xl p-5 border border-slate-700"
                  >
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h3 className="text-xl font-bold text-white">{team.name}</h3>
                        <p className="text-sm text-cyan-400">{event?.name || 'Unknown Event'}</p>
                      </div>
                      <div className="text-right">
                        <div className="text-3xl font-black text-transparent bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text">
                          {team.totalPoints}
                        </div>
                        <div className="text-xs text-slate-400">Total Points</div>
                      </div>
                    </div>

                    <div className="mb-3">
                      <p className="text-sm font-bold text-cyan-400 mb-2">Team Members:</p>
                      <div className="space-y-1">
                        {team.members.map((member, idx) => (
                          <div key={idx} className="flex items-center gap-2 text-sm text-slate-300">
                            <Icons.User className="w-4 h-4 text-purple-400" />
                            <span>{member}</span>
                            {idx === 0 && <Icons.Crown className="w-4 h-4 text-yellow-400" />}
                          </div>
                        ))}
                      </div>
                    </div>

                    {event && team.eventPoints?.[event.id] !== undefined && (
                      <div className="bg-slate-900/50 rounded-lg p-3">
                        <p className="text-sm text-slate-400">Event Score:</p>
                        <p className="text-2xl font-bold text-cyan-400">
                          {team.eventPoints[event.id]} / {event.maxPoints}
                        </p>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function LeaderboardTab({ teams, events }) {
      const sortedTeams = [...teams].sort((a, b) => b.totalPoints - a.totalPoints);

      return (
        <div className="bg-slate-800/70 backdrop-blur-lg rounded-2xl p-6 border border-cyan-500/30">
          <h2 className="text-3xl font-bold text-cyan-400 mb-6 flex items-center gap-3">
            <Icons.Trophy className="w-8 h-8" /> Global Leaderboard
          </h2>

          {sortedTeams.length === 0 ? (
            <div className="text-center py-12 text-slate-400">
              <Icons.Trophy className="w-16 h-16 mx-auto mb-4 opacity-50" />
              <p className="text-xl">No teams have been scored yet</p>
            </div>
          ) : (
            <div className="space-y-4">
              {sortedTeams.map((team, index) => {
                const rank = index + 1;
                const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
                const event = events.find(e => e.id === team.eventId);

                return (
                  <div
                    key={team.id}
                    className={`p-5 rounded-xl border-2 transition-all ${
                      rank === 1
                        ? 'bg-gradient-to-r from-yellow-600/30 to-amber-600/30 border-yellow-400 shadow-lg'
                        : rank === 2
                        ? 'bg-gradient-to-r from-slate-600/30 to-gray-600/30 border-slate-400'
                        : rank === 3
                        ? 'bg-gradient-to-r from-orange-600/30 to-amber-700/30 border-orange-400'
                        : 'bg-slate-700/50 border-slate-600'
                    }`}
                  >
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <div className="text-4xl font-black text-white min-w-[60px]">
                          {medals[rank] || `#${rank}`}
                        </div>
                        <div>
                          <div className="text-2xl font-bold text-white">{team.name}</div>
                          <div className="text-sm text-slate-400">{event?.name || 'Unknown Event'}</div>
                          <div className="text-xs text-slate-500 mt-1">
                            {team.members.join(', ')}
                          </div>
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-4xl font-black text-transparent bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text">
                          {team.totalPoints}
                        </div>
                        <div className="text-sm text-slate-400">total points</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // Render the app
    ReactDOM.render(<AIClubManagement />, document.getElementById('root'));
  </script>
</body>
</html>
